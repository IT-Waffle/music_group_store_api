services:
  db:
    image: postgres:16-alpine
    container_name: music_band_store_db
    restart: always
    env_file: 
      - .env
    ports:
      - "5445:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Checks if DataBase is running and responding
      test: ["CMD-SHELL", "pg_isready -U postgres -d music_store"]
      interval: 5s
      timeout: 5s
      retries: 5

  cache:
    image: redis:8-alpine
    container_name: music_band_store_cache
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      # Checks if Redis is running and responding to PING command
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: music_band_store_api
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy  # Waiting for PostgreSQL
      cache:
        condition: service_healthy  # Waiting for Redis
    volumes:
      - ./uploads:/app/uploads 
    env_file:
      - .env
    healthcheck:
      # Checks if the FastAPI application is running and healthy
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data: