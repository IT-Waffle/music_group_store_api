services:
  cache:
      image: redis:8-alpine
      container_name: music_band_store_cache
      restart: always
      ports:
        - "6379:6379" 
  db:
      image: postgres:16-alpine
      container_name: music_band_store_db
      restart: always
      environment:
        POSTGRES_USER: ${POSTGRES_USER:-admin}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin_password}
        POSTGRES_DB: ${POSTGRES_DB:-music_band_store_db}
      volumes:
        - postgres_data:/var/lib/postgresql/data
      ports:
        - "5445:5432"
volumes:
  postgres_data: